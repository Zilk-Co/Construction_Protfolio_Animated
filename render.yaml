services:
  - type: web
    name: construction-portfolio-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && mkdir -p artifacts/api-server/node_modules && node -e "const fs=require('fs');const pkgs=['esbuild','esbuild-plugin-pino','pino-pretty','thread-stream'];pkgs.forEach(p=>{try{fs.symlinkSync('../../node_modules/'+p,'artifacts/api-server/node_modules/'+p)}catch(e){}})" && pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
