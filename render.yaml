services:
  - type: web
    name: construction-portfolio-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: cd artifacts/api-server && npx tsx src/index.ts
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
