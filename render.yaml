services:
  - type: web
    name: construction-portfolio-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && cd artifacts/api-server && npm install esbuild@0.27.3 esbuild-plugin-pino pino-pretty thread-stream && node ./build.mjs
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
